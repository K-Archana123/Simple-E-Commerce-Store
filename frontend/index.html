<!DOCTYPE html>
<html>
<head>
    <title>ShopEasy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>

    <div class="logo">🛒 ShopEasy</div>

    <div class="search-box">
        <input
            type="text"
            id="searchInput"
            placeholder="Search products..."
        >
    </div>
    
    

    <nav>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <a href="admin.html">Admin</a>
        <a href="orders.html">Orders</a>
        <a href="wishlist.html">❤️ Wishlist
</a>
        <a href="cart.html" id="cartLink">Cart</a>
        
    </nav>

</header>

<section class="hero">
    <h1>Big Summer Sale</h1>
    <p>Up to 70% Off on Electronics</p>
</section>



<h2 class="section-title">Featured Products</h2>


<div class="filter-container">

    <button onclick="filterProducts('All')">
        All
    </button>

    <button onclick="filterProducts('Electronics')">
        📱Electronics
    </button>

    <button onclick="filterProducts('Laptops')">
        💻Laptops
    </button>

    <button onclick="filterProducts('Fashion')">
        👕Fashion
    </button>

    <button onclick="filterProducts('Books')">
        📚Books
    </button>

    <button onclick="filterProducts('Jewellery')">
        💍Jewellery
    </button>

    <button onclick="filterProducts('Household')">
        🏠Household
    </button>

</div>

<div id="products" class="products-grid"></div>

<script src="script.js"></script>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if(user){
    document.querySelector("nav").innerHTML = `
        <span>👤 ${user.name}</span>
        <a href="index.html">Home</a>
        <a href="orders.html">Orders</a>
        <a href="wishlist.html">❤️ Wishlist</a>
        <a href="cart.html">🛒 Cart</a>
        <a href="#" onclick="logout()">Logout</a>
    `;
}else{
    document.querySelector("nav").innerHTML = `
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <a href="orders.html">Orders</a>
        <a href="wishlist.html">❤️ Wishlist</a>
        <a href="cart.html">🛒 Cart</a>
    `;
}

function logout(){
    localStorage.removeItem("user");
    location.reload();
}
</script>


</body>
</html>
