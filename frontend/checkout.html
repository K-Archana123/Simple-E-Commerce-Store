<!DOCTYPE html>
<html>
<head>
    <title>Checkout - ShopEasy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">🛒 ShopEasy</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="cart.html">Cart</a>
        <a href="orders.html">Orders</a>
    </nav>
</header>

<div class="checkout-container" style="display:flex; gap:30px; padding:30px; align-items:flex-start;">

    <div class="checkout-left" style="flex:1; background:#fff; padding:20px; border-radius:12px;">
        <h2>Delivery Address</h2>

        <input type="text" id="name" placeholder="Full Name" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ccc; border-radius:8px;">

        <input type="text" id="phone" placeholder="Phone Number" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ccc; border-radius:8px;">

        <textarea id="address" placeholder="Enter Full Address" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ccc; border-radius:8px; min-height:120px;"></textarea>
    </div>

    <div class="checkout-right" style="flex:1; background:#fff; padding:20px; border-radius:12px;">
        <h2>Order Summary</h2>

        <div id="orderDetails"></div>

        <h3 id="checkoutTotal" style="margin-top:20px;">Total: ₹0</h3>

        <div class="payment-section" style="margin-top:20px;">
            <h3>Payment Method</h3>

            <label class="payment-option" style="display:block; margin:10px 0;">
                <input type="radio" name="payment" value="Cash On Delivery" checked>
                Cash On Delivery
            </label>

            <label class="payment-option" style="display:block; margin:10px 0;">
                <input type="radio" name="payment" value="UPI">
                Google Pay / PhonePe / Paytm
            </label>

            <label class="payment-option" style="display:block; margin:10px 0;">
                <input type="radio" name="payment" value="Card">
                Debit / Credit Card
            </label>
        </div>

        <br><br>

        <button onclick="placeOrder()" class="btn" style="max-width:300px;">
            Place Order
        </button>
    </div>

</div>

<script src="checkout.js"></script>

</body>
</html>
