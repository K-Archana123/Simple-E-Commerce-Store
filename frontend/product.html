<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - ShopEasy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">🛒 ShopEasy</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="cart.html">Cart</a>
    </nav>
</header>

<div class="product-details">
    <div class="product-image">
        <img id="productImage" src="" alt="Product Image">
    </div>

    <div class="product-info">
        <h1 id="productName"></h1>
        <p class="rating" id="productRating"></p>
        <p class="price" id="productPrice"></p>
        <p id="productDescription"></p>
        <div id="sizeSection"></div>

        <button type="button" class="btn" onclick="addToCart()">Add To Cart</button>
        <button type="button" class="buy-btn" onclick="buyNow()">Buy Now</button>
    </div>
</div>

<script src="product.js"></script>
</body>
</html>
